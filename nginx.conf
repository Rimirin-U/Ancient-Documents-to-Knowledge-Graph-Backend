# Nginx 反向代理配置
# 作用：将 80/443 端口的请求转发到 FastAPI 服务（3000端口）
# 同时提供 HTTPS 支持（自签名证书 或 Let's Encrypt）
#
# 部署步骤：
#   1. 安装 Nginx：sudo apt install nginx
#   2. 将本文件复制到 /etc/nginx/sites-available/ancient-docs
#   3. sudo ln -s /etc/nginx/sites-available/ancient-docs /etc/nginx/sites-enabled/
#   4. 生成自签名证书（或使用 certbot 获取 Let's Encrypt 证书）：
#      sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#        -keyout /etc/ssl/private/ancient-docs.key \
#        -out /etc/ssl/certs/ancient-docs.crt \
#        -subj "/CN=8.162.9.49"
#   5. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 8.162.9.49;

    # 将所有 HTTP 请求重定向到 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 8.162.9.49;

    ssl_certificate     /etc/ssl/certs/ancient-docs.crt;
    ssl_certificate_key /etc/ssl/private/ancient-docs.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # 上传文件大小限制（与后端保持一致：10MB）
    client_max_body_size 12M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
